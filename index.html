<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kalyan the Bird</title>
    <style>
        body { margin: 0; overflow: hidden; background: #70c5ce; font-family: 'Arial', sans-serif; }
        canvas { display: block; margin: 0 auto; background: #70c5ce; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.75); color: white; text-align: center; z-index: 10;
        }
        h1 { font-size: 60px; margin: 0; color: #f1c40f; text-shadow: 4px 4px #000; animation: pulse 1.5s infinite; }
        p { font-size: 24px; margin: 10px 0; font-style: italic; color: #bdc3c7; }
        .hint { margin-top: 40px; font-size: 20px; animation: blink 1s infinite; font-weight: bold; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="overlay">
    <h1>Kalyan the Bird</h1>
    <p>Game by Daksh</p>
    <div class="hint">CLICK OR PRESS SPACE TO START</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");

canvas.width = 450;
canvas.height = 650;

// --- ASSETS ---
const friendImg = new Image();
friendImg.src = 'ma friend.png'; // Looking for your specific file

const deathSound = new Audio('death.mp3'); // Looking for your specific file

// --- SETTINGS ---
let gravity = 0.18;
let jumpStrength = -5;
let pipeGap = 270; // Big gap for Kalyan
let pipeSpeed = 2.5;
let gameState = "MENU";
let score = 0;
let frameCount = 0;

const bird = { x: 70, y: 300, w: 150, h: 150, velocity: 0 };
let pipes = [];

// Helper to draw a cloud without an image file
function drawCloud(x, y) {
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(x, y, 30, 0, Math.PI * 2);
    ctx.arc(x + 25, y - 10, 25, 0, Math.PI * 2);
    ctx.arc(x + 25, y + 10, 25, 0, Math.PI * 2);
    ctx.arc(x + 50, y, 30, 0, Math.PI * 2);
    ctx.fill();
}

let cloudPos = [{x: 50, y: 100}, {x: 300, y: 180}, {x: 150, y: 400}];

function resetGame() {
    bird.y = 300;
    bird.velocity = 0;
    pipes = [];
    score = 0;
    frameCount = 0;
    gameState = "PLAYING";
    overlay.classList.add("hidden");
}

function die() {
    deathSound.play();
    gameState = "MENU";
    overlay.classList.remove("hidden");
}

function draw() {
    // 1. Background
    ctx.fillStyle = "#70c5ce";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 2. Built-in Clouds (No image file needed!)
    cloudPos.forEach(c => {
        drawCloud(c.x, c.y);
        c.x -= 0.5;
        if (c.x < -100) c.x = canvas.width + 50;
    });

    if (gameState === "PLAYING") {
        bird.velocity += gravity;
        bird.y += bird.velocity;

        if (frameCount % 85 === 0) {
            let holePos = Math.random() * (canvas.height - pipeGap - 200) + 100;
            pipes.push({ x: canvas.width, top: holePos, passed: false });
        }

        pipes.forEach((p, index) => {
            p.x -= pipeSpeed;
            ctx.fillStyle = "#2ecc71";
            ctx.strokeStyle = "#1b5e20";
            ctx.lineWidth = 3;
            
            // Draw pipes
            ctx.fillRect(p.x, 0, 70, p.top);
            ctx.strokeRect(p.x, 0, 70, p.top);
            ctx.fillRect(p.x, p.top + pipeGap, 70, canvas.height);
            ctx.strokeRect(p.x, p.top + pipeGap, 70, canvas.height);

            if (!p.passed && bird.x > p.x + 70) {
                score++;
                p.passed = true;
            }

            // Simple collision
            if (bird.x + 10 < p.x + 70 && bird.x + bird.w - 10 > p.x &&
               (bird.y + 10 < p.top || bird.y + bird.h - 10 > p.top + pipeGap)) {
                die();
            }
            if (p.x + 70 < 0) pipes.splice(index, 1);
        });

        if (bird.y + bird.h > canvas.height || bird.y < 0) die();

        // 3. Draw Friend Photo
        try {
            ctx.drawImage(friendImg, bird.x, bird.y, bird.w, bird.h);
        } catch (e) {
            // Fallback if image fails
            ctx.fillStyle = "yellow";
            ctx.fillRect(bird.x, bird.y, bird.w, bird.h);
        }

        ctx.fillStyle = "white";
        ctx.font = "bold 40px Arial";
        ctx.textAlign = "center";
        ctx.fillText(score, canvas.width/2, 60);
        frameCount++;
    }

    requestAnimationFrame(draw);
}

const input = () => { if (gameState === "MENU") resetGame(); else bird.velocity = jumpStrength; };
window.addEventListener("keydown", (e) => { if(e.code === "Space") input(); });
canvas.addEventListener("mousedown", input);

draw();
</script>
</body>
</html>
