<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kalyan the Bird</title>
    <style>
        body { margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; font-family: 'Arial Black', Gadget, sans-serif; }
        canvas { 
            border: 5px solid #fff; 
            border-radius: 15px;
            background: #70c5ce;
            image-rendering: pixelated; 
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <audio id="deathSound" src="death.mp3"></audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const deathSound = document.getElementById('deathSound');

        const birdImg = new Image();
        birdImg.src = 'friend.png'; 

        // Game States: 'INTRO', 'PLAYING', 'GAMEOVER'
        let gameState = 'INTRO'; 
        let birdY = 300, velocity = 0, gravity = 0.25, birdRotation = 0;
        let pipes = [], clouds = [], score = 0;
        let frameCount = 0;

        const birdX = 50, pipeWidth = 60, pipeGap = 180; // Easy mode gap

        function createCloud() {
            return { x: canvas.width + 50, y: Math.random() * 200, size: Math.random() * 40 + 20, speed: Math.random() * 0.5 + 0.2 };
        }

        function createPipe() {
            let loc = Math.random() * (canvas.height - 350) + 100;
            pipes.push({ x: canvas.width, top: loc - 600, bottom: loc + pipeGap });
        }

        function resetToIntro() {
            birdY = 300; velocity = 0; pipes = []; score = 0; birdRotation = 0;
            gameState = 'INTRO';
        }

        // Initialize clouds
        for(let i=0; i<6; i++) {
            clouds.push({ x: Math.random() * canvas.width, y: Math.random() * 200, size: Math.random() * 30 + 20, speed: Math.random() * 0.4 + 0.1 });
        }

        function loop() {
            frameCount++;
            // Background
            ctx.fillStyle = "#70c5ce";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Clouds (Always moving)
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            clouds.forEach(c => {
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);
                ctx.fill();
                c.x -= c.speed;
                if (c.x < -50) Object.assign(c, createCloud());
            });

            if (gameState === 'INTRO') {
                // --- GRAND INTRO SCREEN ---
                ctx.textAlign = "center";
                
                // Pulsing effect for title
                let scale = 1 + Math.sin(frameCount * 0.05) * 0.05;
                ctx.save();
                ctx.translate(canvas.width / 2, 200);
                ctx.scale(scale, scale);
                ctx.fillStyle = "#FFD700"; // Gold color
                ctx.strokeStyle = "black";
                ctx.lineWidth = 3;
                ctx.font = "bold 45px Arial";
                ctx.fillText("KALYAN", 0, 0);
                ctx.strokeText("KALYAN", 0, 0);
                ctx.font = "bold 30px Arial";
                ctx.fillText("THE BIRD", 0, 40);
                ctx.strokeText("THE BIRD", 0, 40);
                ctx.restore();

                // Draw static bird for intro
                ctx.drawImage(birdImg, canvas.width / 2 - 25, 300 + Math.sin(frameCount * 0.1) * 10, 50, 50);

                ctx.fillStyle = "white";
                ctx.font = "18px Arial";
                ctx.fillText("Press SPACE to Start", canvas.width / 2, 450);

            } else if (gameState === 'PLAYING') {
                // Physics & Movement
                velocity += gravity;
                birdY += velocity;
                birdRotation = Math.min(Math.PI / 2, Math.max(-Math.PI / 4, (velocity * 0.1)));

                // Draw Bird
                ctx.save();
                ctx.translate(birdX + 25, birdY + 25);
                ctx.rotate(birdRotation);
                ctx.drawImage(birdImg, -25, -25, 150, 150);
                ctx.restore();

                // Pipe Logic
                if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 220) createPipe();
                pipes.forEach((p, i) => {
                    p.x -= 2;
                    ctx.fillStyle = "#2ecc71";
                    ctx.fillRect(p.x, 0, pipeWidth, p.top + 600); // Adjustment for top
                    ctx.fillRect(p.x, p.bottom, pipeWidth, 600);

                    // Fair Hitbox
                    if (birdX + 42 > p.x && birdX + 8 < p.x + pipeWidth && 
                       (birdY + 8 < p.top + 600 || birdY + 42 > p.bottom)) {
                        triggerGameOver();
                    }
                    if (p.x === birdX) score++;
                });

                if (birdY > canvas.height || birdY < -50) triggerGameOver();

                // Live Score
                ctx.fillStyle = "white";
                ctx.font = "bold 40px Arial";
                ctx.fillText(score, canvas.width / 2, 60);

            } else if (gameState === 'GAMEOVER') {
                // Game Over Overlay
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                ctx.font = "40px Arial";
                ctx.fillText("YOU DIED!", canvas.width / 2, 250);
                ctx.font = "24px Arial";
                ctx.fillText("Score: " + score, canvas.width / 2, 300);
                ctx.font = "18px Arial";
                ctx.fillText("Press SPACE to Respawn", canvas.width / 2, 360);
            }

            requestAnimationFrame(loop);
        }

        function triggerGameOver() {
            if (gameState === 'PLAYING') {
                if (deathSound) deathSound.play().catch(() => {});
                gameState = 'GAMEOVER';
            }
        }

        const handleInput = () => {
            if (gameState === 'INTRO') {
                gameState = 'PLAYING';
            } else if (gameState === 'PLAYING') {
                velocity = -5.5;
            } else if (gameState === 'GAMEOVER') {
                resetToIntro(); // Returns to the Grand Intro
            }
        };

        window.addEventListener('keydown', (e) => { if (e.code === 'Space') handleInput(); });
        canvas.addEventListener('mousedown', handleInput);
        loop();
    </script>
</body>
</html>
