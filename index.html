<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Kalyan the Bird</title>

    <style>

        body { margin: 0; overflow: hidden; background: #70c5ce; font-family: 'Arial', sans-serif; touch-action: none; }

        canvas { display: block; margin: 0 auto; background: #70c5ce; max-width: 100%; height: auto; }

        

        #overlay {

            position: absolute; top: 0; left: 0; width: 100%; height: 100%;

            display: flex; flex-direction: column; justify-content: center; align-items: center;

            background: rgba(0, 0, 0, 0.8); color: white; text-align: center; z-index: 99;

            pointer-events: none; /* Let the tap pass through to the window */

        }

        

        h1 { font-size: 50px; margin: 0; color: #f1c40f; text-shadow: 4px 4px #000; animation: pulse 1.5s infinite; }

        p { font-size: 24px; margin: 10px 0; font-style: italic; color: #bdc3c7; }

        .hint { margin-top: 30px; font-size: 18px; animation: blink 1s infinite; font-weight: bold; }

        

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        @keyframes blink { 0% { opacity: 0.1; } 50% { opacity: 1; } 100% { opacity: 0.1; } }

        .hidden { display: none !important; }

    </style>

</head>

<body onclick="masterInput(event)">



<div id="overlay">

    <h1>Kalyan the Bird</h1>

    <p>Game by Daksh</p>

    <div class="hint">TAP ANYWHERE TO START</div>

</div>



<canvas id="gameCanvas"></canvas>



<script>

const canvas = document.getElementById("gameCanvas");

const ctx = canvas.getContext("2d");

const overlay = document.getElementById("overlay");



// Standardized mobile size

canvas.width = 500; 

canvas.height = 800;



const friendImg = new Image();

friendImg.src = 'ma friend.png'; 

const deathSound = new Audio('death.mp3');



let gravity = 0.16;       

let jumpStrength = -6;    

let pipeGap = 330;        

let pipeSpeed = 3;

let gameState = "MENU";

let score = 0;

let frameCount = 0;



const bird = { x: 80, y: 300, w: 220, h: 220, velocity: 0 };

let pipes = [];



function drawCloud(x, y) {

    ctx.fillStyle = "rgba(255, 255, 255, 0.9)";

    ctx.beginPath();

    ctx.arc(x, y, 40, 0, Math.PI * 2);

    ctx.arc(x + 30, y - 15, 35, 0, Math.PI * 2);

    ctx.arc(x + 30, y + 15, 35, 0, Math.PI * 2);

    ctx.arc(x + 60, y, 40, 0, Math.PI * 2);

    ctx.fill();

}



let cloudPos = [{x: 50, y: 100}, {x: 350, y: 180}, {x: 200, y: 550}];



function resetGame() {

    bird.y = 250;

    bird.velocity = 0;

    pipes = [];

    score = 0;

    frameCount = 0;

    gameState = "PLAYING";

    overlay.classList.add("hidden");

    

    // Unlock and play audio immediately on first tap

    deathSound.play().then(() => {

        deathSound.pause();

        deathSound.currentTime = 0;

    }).catch(e => console.log("Audio waiting for user interaction"));

}



function die() {

    deathSound.play();

    gameState = "MENU";

    overlay.classList.remove("hidden");

}



function draw() {

    ctx.fillStyle = "#70c5ce";

    ctx.fillRect(0, 0, canvas.width, canvas.height);



    cloudPos.forEach(c => {

        drawCloud(c.x, c.y);

        c.x -= 0.8;

        if (c.x < -150) c.x = canvas.width + 100;

    });



    if (gameState === "PLAYING") {

        bird.velocity += gravity;

        bird.y += bird.velocity;



        if (frameCount % 95 === 0) {

            let holePos = Math.random() * (canvas.height - pipeGap - 200) + 100;

            pipes.push({ x: canvas.width, top: holePos, passed: false });

        }



        pipes.forEach((p, index) => {

            p.x -= pipeSpeed;

            ctx.fillStyle = "#2ecc71";

            ctx.strokeStyle = "#1b5e20";

            ctx.lineWidth = 6;

            ctx.fillRect(p.x, 0, 80, p.top);

            ctx.strokeRect(p.x, 0, 80, p.top);

            ctx.fillRect(p.x, p.top + pipeGap, 80, canvas.height);

            ctx.strokeRect(p.x, p.top + pipeGap, 80, canvas.height);



            if (!p.passed && bird.x + (bird.w/2) > p.x + 80) {

                score++;

                p.passed = true;

            }



            let mx = 65; 

            let my = 55; 

            if (bird.x + mx < p.x + 80 && bird.x + bird.w - mx > p.x &&

               (bird.y + my < p.top || bird.y + bird.h - my > p.top + pipeGap)) {

                die();

            }

            if (p.x + 80 < 0) pipes.splice(index, 1);

        });



        if (bird.y + bird.h - 40 > canvas.height || bird.y + 40 < 0) die();



        if (friendImg.complete && friendImg.naturalWidth !== 0) {

            ctx.drawImage(friendImg, bird.x, bird.y, bird.w, bird.h);

        } else {

            ctx.fillStyle = "#f1c40f"; 

            ctx.fillRect(bird.x, bird.y, bird.w, bird.h);

        }



        ctx.fillStyle = "white";

        ctx.font = "bold 60px Arial";

        ctx.textAlign = "center";

        ctx.fillText(score, canvas.width/2, 80);



        frameCount++;

    }

    requestAnimationFrame(draw);

}



// --- ULTIMATE INPUT FIX ---

function masterInput(e) {

    if (gameState === "MENU") {

        resetGame();

    } else {

        bird.velocity = jumpStrength;

    }

}



// Keyboard fallback for PC

window.addEventListener("keydown", (e) => {

    if (e.code === "Space") masterInput(e);

});



draw();

</script>

</body>

</html>
