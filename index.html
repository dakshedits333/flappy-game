<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kalyan the Bird - Game By Daksh</title>
    <style>
        body { margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; font-family: 'Arial Black', sans-serif; }
        canvas { 
            border: 5px solid #fff; 
            background: #70c5ce;
            image-rendering: pixelated; 
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <audio id="deathSound" src="death.mp3"></audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const deathSound = document.getElementById('deathSound');

        const birdImg = new Image();
        birdImg.src = 'friend.png'; 

        let gameState = 'INTRO'; 
        let birdY = 300, velocity = 0, gravity = 0.22; // Slightly lighter gravity for easier control
        let pipes = [], clouds = [], score = 0;
        let frameCount = 0;

        const birdX = 50;
        const pipeWidth = 60;
        const pipeGap = 190; // Even wider gap for "Easy Mode"

        function createPipe() {
            let loc = Math.random() * (canvas.height - 400) + 100;
            pipes.push({ x: canvas.width, top: loc, bottom: loc + pipeGap });
        }

        // --- BIRD DRAWING WITH THICK OUTLINE ---
        function drawBird(x, y) {
            const size = 50;
            const thick = 3; // Thicker outline
            
            ctx.save();
            // Draw 8-direction outline for maximum thickness
            ctx.fillStyle = "black";
            for(let i = -thick; i <= thick; i += thick) {
                for(let j = -thick; j <= thick; j += thick) {
                    ctx.drawImage(birdImg, x + i, y + j, size, size);
                }
            }
            // Main Image
            ctx.drawImage(birdImg, x, y, size, size);
            ctx.restore();
        }

        function resetToIntro() {
            birdY = 300; velocity = 0; pipes = []; score = 0;
            gameState = 'INTRO';
        }

        // Initialize clouds
        for(let i=0; i<6; i++) {
            clouds.push({ x: Math.random() * canvas.width, y: Math.random() * 200, size: Math.random() * 30 + 20, speed: Math.random() * 0.3 + 0.1 });
        }

        function loop() {
            frameCount++;
            ctx.fillStyle = "#70c5ce";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Clouds
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            clouds.forEach(c => {
                ctx.beginPath(); ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2); ctx.fill();
                c.x -= c.speed;
                if (c.x < -50) { c.x = canvas.width + 50; c.y = Math.random() * 200; }
            });

            if (gameState === 'INTRO') {
                ctx.textAlign = "center";
                let scale = 1 + Math.sin(frameCount * 0.05) * 0.05;
                ctx.save();
                ctx.translate(canvas.width / 2, 180);
                ctx.scale(scale, scale);
                ctx.fillStyle = "#FFD700"; ctx.strokeStyle = "black"; ctx.lineWidth = 3;
                ctx.font = "bold 50px Arial";
                ctx.fillText("KALYAN", 0, 0); ctx.strokeText("KALYAN", 0, 0);
                ctx.font = "bold 30px Arial";
                ctx.fillText("THE BIRD", 0, 45); ctx.strokeText("THE BIRD", 0, 45);
                ctx.restore();

                drawBird(canvas.width / 2 - 25, 300 + Math.sin(frameCount * 0.1) * 15);

                ctx.fillStyle = "white";
                ctx.font = "20px Arial";
                ctx.fillText("Press SPACE to Start", canvas.width / 2, 480);

            } else if (gameState === 'PLAYING') {
                velocity += gravity;
                birdY += velocity;

                drawBird(birdX, birdY);

                if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 240) createPipe();
                
                pipes.forEach((p, i) => {
                    p.x -= 1.8; // Slower speed
                    ctx.fillStyle = "#2ecc71";
                    ctx.strokeStyle = "#1e8449";
                    ctx.lineWidth = 4;
                    
                    // Draw Pipes
                    ctx.fillRect(p.x, 0, pipeWidth, p.top);
                    ctx.strokeRect(p.x, 0, pipeWidth, p.top);
                    ctx.fillRect(p.x, p.bottom, pipeWidth, canvas.height - p.bottom);
                    ctx.strokeRect(p.x, p.bottom, pipeWidth, canvas.height - p.bottom);

                    // --- SUPER FAIR COLLISION ---
                    // We only check a tiny 30x30 box in the center of the 50x50 image
                    let bx = birdX + 10; 
                    let by = birdY + 10;
                    let bw = 30;
                    let bh = 30;

                    if (bx + bw > p.x && bx < p.x + pipeWidth) {
                        if (by < p.top || by + bh > p.bottom) {
                            triggerGameOver();
                        }
                    }
                    
                    if (p.x + pipeWidth < birdX && !p.passed) {
                        score++;
                        p.passed = true;
                    }
                });

                if (birdY > canvas.height - 20 || birdY < -20) triggerGameOver();

                ctx.fillStyle = "white"; 
                ctx.font = "bold 50px Arial";
                ctx.textAlign = "center";
                ctx.fillText(score, canvas.width / 2, 70);

            } else if (gameState === 'GAMEOVER') {
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white"; ctx.textAlign = "center";
                ctx.font = "40px Arial";
                ctx.fillText("KALYAN DIED!", canvas.width / 2, 250);
                ctx.font = "24px Arial";
                ctx.fillText("Final Score: " + score, canvas.width / 2, 300);
                ctx.font = "18px Arial";
                ctx.fillText("Press SPACE for Intro", canvas.width / 2, 360);
            }

            requestAnimationFrame(loop);
        }

        function triggerGameOver() {
            if (gameState === 'PLAYING') {
                if (deathSound) deathSound.play().catch(() => {});
                gameState = 'GAMEOVER';
            }
        }

        const handleInput = (e) => {
            if (e.type === 'keydown' && e.code !== 'Space') return;
            if (gameState === 'INTRO') gameState = 'PLAYING';
            else if (gameState === 'PLAYING') velocity = -5.2;
            else if (gameState === 'GAMEOVER') resetToIntro();
        };

        window.addEventListener('keydown', handleInput);
        canvas.addEventListener('mousedown', handleInput);
        loop();
    </script>
</body>
</html>
