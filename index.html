<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flappy Friend Game</title>
    <style>
        body { margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; background: #333; font-family: sans-serif; }
        canvas { border: 2px solid #000; background: #70c5ce; }
        #instructions { position: absolute; color: white; top: 10px; }
    </style>
</head>
<body>

    <div id="instructions">Press Space or Click to Jump</div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <audio id="deathSound" src="death.mp3"></audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const deathSound = document.getElementById('deathSound');

        // --- ASSETS ---
        const birdImg = new Image();
        birdImg.src = 'friend.png'; // Make sure your photo is named this!

        // Game Variables
        let birdX = 50, birdY = 300, velocity = 0, gravity = 0.25;
        let pipes = [];
        let score = 0;
        let gameActive = true;

        // Pipe Settings
        const pipeWidth = 50, pipeGap = 150;

        function createPipe() {
            let loc = Math.random() * (canvas.height - 300) + 100;
            pipes.push({ x: canvas.width, top: loc - 600, bottom: loc + pipeGap });
        }

        function resetGame() {
            birdY = 300; velocity = 0; pipes = []; score = 0; gameActive = true;
        }

        function loop() {
            // Background
            ctx.fillStyle = "#70c5ce";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameActive) {
                // Bird Physics
                velocity += gravity;
                birdY += velocity;

                // Draw Friend's Face
                ctx.drawImage(birdImg, birdX, birdY, 50, 50);

                // Pipes logic
                if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 200) createPipe();

                pipes.forEach((p, i) => {
                    p.x -= 2;
                    ctx.fillStyle = "green";
                    ctx.fillRect(p.x, p.top, pipeWidth, 600); // Top pipe
                    ctx.fillRect(p.x, p.bottom, pipeWidth, 600); // Bottom pipe

                    // Collision Detection
                    if (birdX + 40 > p.x && birdX < p.x + pipeWidth && 
                       (birdY < p.top + 600 || birdY + 40 > p.bottom)) {
                        gameOver();
                    }
                    
                    if (p.x === birdX) score++;
                });

                // Screen boundaries
                if (birdY > canvas.height || birdY < 0) gameOver();

                // Score
                ctx.fillStyle = "white";
                ctx.font = "30px Arial";
                ctx.fillText(score, canvas.width / 2, 50);

            } else {
                ctx.fillStyle = "white";
                ctx.font = "40px Arial";
                ctx.fillText("GAME OVER", 80, 300);
                ctx.font = "20px Arial";
                ctx.fillText("Click to Restart", 130, 350);
            }

            requestAnimationFrame(loop);
        }

        function gameOver() {
            if (gameActive) {
                deathSound.play().catch(() => {}); // Play sound
                gameActive = false;
            }
        }

        window.addEventListener('keydown', (e) => { if (e.code === 'Space') velocity = -6; if(!gameActive) resetGame(); });
        canvas.addEventListener('mousedown', () => { velocity = -6; if(!gameActive) resetGame(); });

        loop();
    </script>
</body>
</html>
